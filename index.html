<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Checklist</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f4f7f6;
      color: #143331;
    }
    .box {
      width: min(420px, 100%);
      background: #fff;
      border: 1px solid #dbe7e2;
      border-radius: 10px;
      padding: 22px;
      box-shadow: 0 14px 34px rgba(18, 59, 58, .12);
    }
    h1 { margin: 0 0 8px; font-size: 22px; letter-spacing: 0; }
    p { margin: 0 0 16px; color: #5d716d; font-size: 14px; line-height: 1.55; }
    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid #cbdad5;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 18px;
      letter-spacing: .04em;
    }
    button {
      width: 100%;
      min-height: 46px;
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      background: #176b61;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
    }
    .error { min-height: 22px; margin-top: 10px; color: #b91c1c; font-size: 13px; }
  </style>
</head>

    </form>
  </main>

      bytes.forEach((byte) => text += String.fromCharCode(byte));
      return btoa(text);
    }
    function bytesToBase64Url(bytes) {
      return bytesToB64(bytes).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }
    async function sha256Text(text) {
      const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
      return bytesToBase64Url(new Uint8Array(digest));
    }
    async function deriveKeyBytes(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(password),
        "PBKDF2",
        false,
        ["deriveBits"]
      );
      const bits = await crypto.subtle.deriveBits(
        { name: "PBKDF2", salt: b64ToBytes(saltB64), iterations: 180000, hash: "SHA-256" },
        material,
        256
      );
      return new Uint8Array(bits);
    }
    async function importAesKey(rawKey) {
      return crypto.subtle.importKey(
        "raw",
        rawKey,
        { name: "AES-GCM" },
        false,
        ["decrypt"]
      );
    }
    async function decryptHtml(key) {
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: b64ToBytes(ivB64) },
        key,
        b64ToBytes(encryptedPayload)
      );
      return new TextDecoder().decode(decrypted);
    }
    function openChecklist(html) {
      document.open();
      document.write(html);
      document.close();
    }
    async function rememberAndOpen(password) {
      const keyBytes = await deriveKeyBytes(password);
      const key = await importAesKey(keyBytes);
      const html = await decryptHtml(key);
      const room = await sha256Text("ygmw-sync-v1:" + password);
      localStorage.setItem("checklist-unlock-key-v1", bytesToB64(keyBytes));
      localStorage.setItem("checklist-room-v1", room);
      sessionStorage.setItem("checklist-passphrase", password);
      sessionStorage.setItem("checklist-room", room);
      openChecklist(html);
    }
    async function tryRememberedOpen() {
      const error = document.getElementById("error");
      error.textContent = "";
      const savedKey = localStorage.getItem("checklist-unlock-key-v1");
      const savedRoom = localStorage.getItem("checklist-room-v1");
      if (!savedKey || !savedRoom) return false;
      try {
        error.textContent = "正在自动打开...";
        const key = await importAesKey(b64ToBytes(savedKey));
        const html = await decryptHtml(key);
        sessionStorage.setItem("checklist-room", savedRoom);
        openChecklist(html);
        return true;
      } catch {
        localStorage.removeItem("checklist-unlock-key-v1");
        localStorage.removeItem("checklist-room-v1");
        error.textContent = "";
        return false;
      }
    }
    document.getElementById("unlock-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const error = document.getElementById("error");
      error.textContent = "";
      try {
        const password = document.getElementById("password").value;
        await rememberAndOpen(password);
      } catch {
        error.textContent = "口令不对，请重新输入。";
      }
    });
    tryRememberedOpen().then((opened) => {
      if (!opened) document.getElementById("password").focus();
    });
  </script>
