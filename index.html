<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Checklist</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f4f7f6;
      color: #143331;
    }
    .box {
      width: min(420px, 100%);
      background: #fff;
      border: 1px solid #dbe7e2;
      border-radius: 10px;
      padding: 22px;
      box-shadow: 0 14px 34px rgba(18, 59, 58, .12);
    }
    h1 { margin: 0 0 8px; font-size: 22px; letter-spacing: 0; }
    p { margin: 0 0 16px; color: #5d716d; font-size: 14px; line-height: 1.55; }
    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid #cbdad5;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 18px;
      letter-spacing: .04em;
    }
    button {
      width: 100%;
      min-height: 46px;
      margin-top: 12px;
      border: 0;
      border-radius: 8px;
      background: #176b61;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
    }
    .error { min-height: 22px; margin-top: 10px; color: #b91c1c; font-size: 13px; }
  </style>
</head>
<body>
  <main class="box">
    <h1>Checklist</h1>
    <p>请输入口令后查看。两台手机输入同一个口令，会自动同步勾选和备注。</p>
    <form id="unlock-form">
      <input id="password" type="password" autocomplete="current-password" placeholder="Password" autofocus />
      <button type="submit">打开</button>
      <div class="error" id="error"></div>
    </form>
  </main>
